# ==============================================================================
# NGINX Configuration for Laravel 13 (PHP 8.3-FPM)
# ==============================================================================
#
# Replace 'yourdomain.duckdns.org' with your actual DuckDNS domain.
# Replace '/var/www/sistem-penjadwalan' with your actual deployment directory path.
#

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.duckdns.org;
    
    # Let's Encrypt webroot verification path
    location /.well-known/acme-challenge/ {
        root /var/www/sistem-penjadwalan/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.duckdns.org;

    root /var/www/sistem-penjadwalan/public;
    index index.php;

    charset utf-8;

    # SSL Certificates (managed by Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/yourdomain.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.duckdns.org/privkey.pem;
    
    # Secure SSL Protocols and Ciphers (Mozilla Modern Profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL Session cache & settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;
    # Strict-Transport-Security (HSTS) - uncomment after confirming HTTPS is stable
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Dynamic asset handling (routes to Laravel index.php)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Disable logging for favicon and robots.txt
    location = /favicon.ico { 
        access_log off; 
        log_not_found off; 
    }
    location = /robots.txt  { 
        access_log off; 
        log_not_found off; 
    }

    # Custom 404 page (Laravel handles error pages, but nice to fallback)
    error_page 404 /index.php;

    # PHP-FPM Configuration
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Buffer tuning for large responses
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        
        # Prevent FPM timeouts during long processing
        fastcgi_read_timeout 600;
    }

    # Cache Static Assets (CSS, JS, Images, Fonts, etc.)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|otf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, must-revalidate";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Upload size limit (adjust as needed, standard Laravel limit is usually higher than default 1M)
    client_max_body_size 64M;

    # Logging config
    access_log /var/log/nginx/sistem_penjadwalan_access.log;
    error_log /var/log/nginx/sistem_penjadwalan_error.log warn;
}
